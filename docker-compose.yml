services:

  postgres:
    image: postgres:16

    container_name: dronesentinel-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dronesentinel_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  backend:

    build: ./backend

    container_name: dronesentinel-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

    volumes:
      - ./backend:/app

    restart: unless-stopped

  frontend:

    build: ./frontend

    container_name: dronesentinel-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: unless-stopped

volumes:
  postgres_data: